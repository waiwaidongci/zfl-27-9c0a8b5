<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>古籍修补台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div><h1>古籍修补台</h1><div>拖拽纸片归位，沿字列和边缘修复残页。</div></div>
    <div class="header-actions">
      <button id="dailyChallengeBtn" class="daily-entry-btn">每日残页挑战</button>
      <button id="libraryEntryBtn" class="library-entry-btn">藏书阁</button>
      <button id="editorEntryBtn" class="editor-entry-btn">残页编辑器</button>
      <button id="generatorEntryBtn" class="generator-entry-btn">🔧 生成器</button>
      <button id="tutorialEntryBtn" class="tutorial-entry-btn">新手引导</button>
      <button id="resetBtn">重开本关</button>
    </div>
  </header>

  <div class="game-view" id="gameView">
    <main class="app">
      <aside class="panel">
        <h2>每日残页挑战</h2>
        <div class="daily-challenge-panel" id="dailyChallengePanel"></div>
        <h2 style="margin-top:16px">进度册</h2>
        <div class="progress-book" id="levels"></div>
        <h2 style="margin-top:16px">本关状态</h2>
        <div class="stats">
          <div>当前残页：<b class="level-text" id="levelText">1</b></div>
          <div>当前分数：<b id="scoreText">0</b></div>
          <div>剩余时间：<b id="timeText">120</b>秒</div>
          <div>本页最佳得分：<b id="bestText">0</b></div>
          <div>错误尝试：<b id="errorText">0</b>次</div>
        </div>
        <div class="theme-panel">
          <h3>当前主题</h3>
          <div class="theme-info" id="themeInfo">
            <div><span>纸张纹理</span><span class="theme-val" id="paperText">宣纸</span></div>
            <div><span>墨色</span><span class="theme-val" id="inkText">墨黑</span></div>
            <div><span>边框样式</span><span class="theme-val" id="borderText">无</span></div>
            <div><span>背景台面</span><span class="theme-val" id="tableText">基础</span></div>
          </div>
        </div>
        <p style="margin-top:12px">纸片靠近正确格子会自动吸附。提示会高亮一个尚未归位的格子（使用提示会扣分）。</p>
        <button id="hintBtn" class="secondary">使用提示</button>
        <div class="toolbox-panel" id="toolboxContainer"></div>
      </aside>
      <section class="panel">
        <h2>残页</h2>
        <div class="board" id="board"></div>
      </section>
      <aside class="panel">
        <h2>剩余纸片</h2>
        <div class="tray" id="tray"></div>
      </aside>
    </main>
  </div>

  <div class="editor-view" id="editorView">
    <div id="editorContainer"></div>
  </div>

  <div class="library-view" id="libraryView">
    <div id="libraryContainer"></div>
  </div>

  <div class="overlay hidden" id="overlay">
    <div class="modal">
      <h2 id="modalTitle">修补完成</h2>
      <div class="result-grid" id="modalResult"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button id="retryBtn" class="secondary">重玩本关</button>
        <button id="nextBtn">下一关</button>
      </div>
    </div>
  </div>
  <div class="tutorial-mask" id="tutorialMask"></div>
  <div class="tutorial-highlight hidden" id="tutorialHighlight"></div>
  <div class="tutorial-tooltip hidden" id="tutorialTooltip">
    <div class="tutorial-step" id="tutorialStepText">第 1 步 / 共 5 步</div>
    <h3 id="tutorialTitle">欢迎来到古籍修补台</h3>
    <p id="tutorialDesc">在这里，你将学习如何修补古籍残页。让我们开始吧！</p>
    <div class="tutorial-actions">
      <button class="tutorial-skip" id="tutorialSkipBtn">跳过引导</button>
      <button id="tutorialNextBtn">开始</button>
    </div>
  </div>
  <div class="keyboard-hint">键盘模式：方向键移动 | 空格/回车选择放置 | R/E旋转 | F翻转 | ESC取消</div>

  <script src="js/thesaurus.js?v=20260619"></script>
  <script src="js/data.js?v=20260618c"></script>
  <script src="js/generator.js?v=20260619"></script>
  <script src="js/levelAdapter.js?v=20260619"></script>
  <script src="js/themeRenderer.js?v=20260619"></script>
  <script src="js/dailyChallenge.js?v=20260618c"></script>
  <script src="js/progress.js?v=20260618c"></script>
  <script src="js/pieceState.js?v=20260618c"></script>
  <script src="js/toolbox.js?v=20260618c"></script>
  <script src="js/settlement.js?v=20260618c"></script>
  <script src="js/library.js?v=20260619"></script>
  <script src="js/tutorial.js?v=20260618c"></script>
  <script src="js/game.js?v=20260618c"></script>
  <script src="js/editor.js?v=20260618c"></script>
  <script src="js/debugPanel.js?v=20260619"></script>
  <script src="js/app.js?v=20260619"></script>
</body>
</html>
